<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <!-- Gym floor -->
  <rect x="10" y="10" width="940" height="520" stroke="#94a3b8" stroke-width="2" fill="white" rx="4"/>

  <!-- Floor grid lines (subtle) -->
  <line x1="250" y1="10" x2="250" y2="530" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="490" y1="10" x2="490" y2="530" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="730" y1="10" x2="730" y2="530" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="180" x2="950" y2="180" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10" y1="360" x2="950" y2="360" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Step platform (center) -->
  <rect x="350" y="210" width="260" height="120" rx="6" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <rect x="358" y="218" width="244" height="104" rx="4" stroke="#cbd5e1" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <text x="480" y="278" text-anchor="middle" font-size="16" fill="#cbd5e1" font-family="system-ui">STEP</text>

  <!-- Instructor position marker -->
  <circle cx="480" cy="80" r="4" fill="#cbd5e1"/>
  <text x="480" y="60" text-anchor="middle" font-size="12" fill="#cbd5e1" font-family="system-ui">INSTRUCTOR</text>

  <!-- Mirror wall indicator (top) -->
  <line x1="100" y1="12" x2="860" y2="12" stroke="#94a3b8" stroke-width="3"/>
  <text x="480" y="30" text-anchor="middle" font-size="11" fill="#cbd5e1" font-family="system-ui">MIRROR</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none">
  <!-- Court outline -->
  <rect x="10" y="10" width="980" height="480" stroke="#94a3b8" stroke-width="2" fill="white" rx="2"/>

  <!-- Center line -->
  <line x1="500" y1="10" x2="500" y2="490" stroke="#94a3b8" stroke-width="2"/>

  <!-- Center circle -->
  <circle cx="500" cy="250" r="4" fill="#94a3b8"/>

  <!-- Left goal area (6m arc) -->
  <path d="M 10 155 L 72 155 A 150 150 0 0 1 72 345 L 10 345" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <!-- Left free throw line (9m, dashed) -->
  <path d="M 10 105 L 110 105 A 200 200 0 0 1 110 395 L 10 395" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
  <!-- Left 7m line -->
  <line x1="80" y1="235" x2="80" y2="265" stroke="#94a3b8" stroke-width="2"/>
  <!-- Left goal -->
  <rect x="2" y="210" width="8" height="80" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <!-- Left GK restriction (4m) -->
  <line x1="50" y1="240" x2="50" y2="260" stroke="#94a3b8" stroke-width="2"/>

  <!-- Right goal area (6m arc) -->
  <path d="M 990 155 L 928 155 A 150 150 0 0 0 928 345 L 990 345" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <!-- Right free throw line (9m, dashed) -->
  <path d="M 990 105 L 890 105 A 200 200 0 0 0 890 395 L 990 395" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
  <!-- Right 7m line -->
  <line x1="920" y1="235" x2="920" y2="265" stroke="#94a3b8" stroke-width="2"/>
  <!-- Right goal -->
  <rect x="990" y="210" width="8" height="80" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <!-- Right GK restriction (4m) -->
  <line x1="950" y1="240" x2="950" y2="260" stroke="#94a3b8" stroke-width="2"/>

  <!-- Substitution area marks -->
  <line x1="355" y1="490" x2="355" y2="480" stroke="#94a3b8" stroke-width="2"/>
  <line x1="645" y1="490" x2="645" y2="480" stroke="#94a3b8" stroke-width="2"/>
</svg>

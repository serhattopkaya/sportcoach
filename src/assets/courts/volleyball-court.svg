<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <!-- Court outline -->
  <rect x="10" y="10" width="880" height="480" stroke="#94a3b8" stroke-width="2" fill="white" rx="2"/>

  <!-- Net (center line) -->
  <line x1="450" y1="10" x2="450" y2="490" stroke="#94a3b8" stroke-width="3"/>

  <!-- Attack lines (3m from net) -->
  <line x1="300" y1="10" x2="300" y2="490" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 4"/>
  <line x1="600" y1="10" x2="600" y2="490" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- Left side zones -->
  <!-- Zone markers -->
  <text x="155" y="90" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">4</text>
  <text x="370" y="90" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">3</text>
  <text x="370" y="440" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">2</text>
  <text x="155" y="440" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">5</text>
  <text x="155" y="265" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">6</text>
  <text x="370" y="265" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">1</text>

  <!-- Right side zones (mirrored) -->
  <text x="530" y="90" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">2</text>
  <text x="745" y="90" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">1</text>
  <text x="745" y="440" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">4</text>
  <text x="530" y="440" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">3</text>
  <text x="745" y="265" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">5</text>
  <text x="530" y="265" font-size="24" fill="#cbd5e1" text-anchor="middle" font-family="system-ui">6</text>
</svg>
